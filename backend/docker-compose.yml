services:
  database:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: audiomusica-asset-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:-YourStrong!Passw0rd}
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -C -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: audiomusica-asset-backend
    env_file:
      - .env
    environment:
      PORT: 3001
      DATABASE_URL: ${DATABASE_URL:-sqlserver://database:1433;database=AudiomusicaAssetManagement;user=sa;password=YourStrong!Passw0rd;encrypt=true;trustServerCertificate=true}
    ports:
      - "3001:3001"
    depends_on:
      database:
        condition: service_healthy

volumes:
  sqlserver_data:
